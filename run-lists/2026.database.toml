# 2026 full database of runs info
# The first run defines the standard configuration,
# all subsequent runs only specify fields that changed w.r.t the previous run.
#
# Source: bootstrap entries (2026-05-29) for the two local test runs in Data/.
# Marked as `quality = "test"` so they sort distinctly from real beam runs.
# Fields below carry placeholder values that mirror the 2025 standard
# config; operators should overwrite with real values as the campaign
# starts.

[runs."20260528-182902"]
beam_status = "off"
particle = "pions"
polarity = "positive"
beam_energy = 0
rdo_firmware = "rdo-v1.3.16"
timing_firmware = "single-ext-std-tb2024-base.02"
temperature = -28.0
v_bias = 52.00
n_spills = 10
quality = "test"
radiators = [
  { type = "Aerogel", refindex = 1.021,  tag = "AG22-J001", depth = 2 },
  { type = "Aerogel", refindex = 1.0207, tag = "AG22-J003", depth = 2, side = "B" }
]
notes = "[test] 2026 bootstrap entry — calibration + pulser QA only (no beam)"

[runs."20260528-191848"]
notes = "[test] 2026 bootstrap entry — calibration + lightdata, no beam"
beam_energy = 35

# First ALCOR ToT (time-over-threshold) run, and the first real beam run in
# this database (the two entries above are beam-off bootstraps).  op_mode = 4
# makes lightdata_writer pair even/odd TDC edges into one hit carrying a
# duration (vs LET's leading-edge-only) and emit the ToT QA; auto-applied per
# run via the pipeline's --run-database pass-down (no per-run CLI).  The
# beam_status / beam_energy / polarity set here forward-inherit to the runs
# below.
# NOTE: op_mode forward-inherits too, so the next non-ToT run
# (20260604-234824) resets it to 1 (LET).
[runs."20260604-232500"]
beam_status = "on"
beam_energy = 180
polarity = "positive"
op_mode = 4
notes = "first ToT-mode run (ALCOR ToT, op_mode = 4); SPS, 180 GeV positive beam"

# SPS beam continues in LET — reset op_mode from the ToT run above.
[runs."20260604-234824"]
op_mode = 1
notes = "LET resumes after the ToT run; SPS, 180 GeV positive beam"

# 2026-PS campaign (runs on/after 2026-06-10): luca_and_finger routes through
# kc705-200 (not rdo-192) — see conf/sets/2026-PS/.  Beam metadata inherited
