<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dRICH Analysis</title>
<style>
:root {
  --bg: #0f1117; --bg2: #1a1d27; --bg3: #252836;
  --accent: #4f8ef7; --accent2: #7c3aed;
  --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
  --text: #e2e8f0; --text2: #94a3b8; --border: #2d3148;
  --radius: 10px; --font: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

/* Header */
header { background: var(--bg2); border-bottom: 1px solid var(--border);
         padding: 14px 20px; display: flex; align-items: center; gap: 12px;
         position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 1.1rem; font-weight: 600; }
header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green);
              box-shadow: 0 0 8px var(--green); }
header .dot.red { background: var(--red); box-shadow: 0 0 8px var(--red); }

/* Tabs */
.tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); }
.tab  { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 0.85rem;
        color: var(--text2); border-bottom: 2px solid transparent; transition: all .2s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Panels */
.panel { display: none; padding: 16px; max-width: 800px; margin: 0 auto; }
.panel.active { display: block; }

/* Form elements */
.field { margin-bottom: 14px; }
label  { display: block; font-size: 0.78rem; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
input:not([type="checkbox"]), select {
                width: 100%; background: var(--bg3); border: 1px solid var(--border);
                color: var(--text); padding: 10px 12px; border-radius: var(--radius);
                font-size: 0.95rem; outline: none; -webkit-appearance: none; }
input:not([type="checkbox"]):focus, select:focus { border-color: var(--accent); }
select option { background: var(--bg3); }

/* Toggle */
.toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; inset: 0; background: var(--bg3); border-radius: 24px;
          border: 1px solid var(--border); cursor: pointer; transition: .2s; }
.slider:before { content:''; position: absolute; height: 18px; width: 18px;
                 left: 2px; bottom: 2px; background: var(--text2);
                 border-radius: 50%; transition: .2s; }
.toggle input:checked + .slider { background: var(--accent); border-color: var(--accent); }
.toggle input:checked + .slider:before { transform: translateX(20px); background: white; }
.toggle-label { font-size: 0.9rem; color: var(--text2); }

/* Macro checkboxes */
.macros-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.macro-cb { display: flex; align-items: center; gap: 8px; background: var(--bg3);
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 8px 12px; cursor: pointer; }
.macro-cb input { width: auto; }
.macro-cb span { font-size: 0.85rem; }

/* Buttons */
.btn { width: 100%; padding: 13px; border: none; border-radius: var(--radius);
       font-size: 1rem; font-weight: 600; cursor: pointer; transition: .15s; }
.btn-run  { background: var(--accent); color: white; }
.btn-run:hover  { filter: brightness(1.15); }
.btn-run:active { transform: scale(.98); }
.btn-run:disabled { background: var(--bg3); color: var(--text2); cursor: not-allowed; }
.btn-sm { width: auto; padding: 6px 14px; font-size: 0.8rem; background: var(--bg3);
          color: var(--text2); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; }

/* Log */
#log { background: #0a0d14; border: 1px solid var(--border); border-radius: var(--radius);
       padding: 14px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8rem;
       line-height: 1.6; height: 55vh; overflow-y: auto; white-space: pre-wrap;
       word-break: break-all; color: #a8e6cf; }
.log-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.log-bar span { font-size: 0.78rem; color: var(--text2); }

/* Status badge */
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px;
         font-size: 0.72rem; font-weight: 600; }
.badge.running { background: rgba(79,142,247,.2); color: var(--accent); }
.badge.done    { background: rgba(34,197,94,.2);  color: var(--green); }
.badge.error   { background: rgba(239,68,68,.2);  color: var(--red); }
.badge.idle    { background: var(--bg3); color: var(--text2); }

/* Plot browser */
.conf-chip { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px;
             padding: 3px 10px; font-size: 0.72rem; color: var(--text2); cursor: pointer; }
.conf-chip:hover { border-color: var(--accent); color: var(--accent); }
.conf-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,.1); }

/* Image grid */
.img-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 12px; }
@media (min-width: 600px) { .img-grid { grid-template-columns: repeat(3, 1fr); } }
.img-card { background: var(--bg3); border-radius: 8px; overflow: hidden; cursor: pointer; }
.img-card img { width: 100%; display: block; }
.img-card p   { font-size: 0.7rem; color: var(--text2); padding: 4px 6px;
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Lightbox */
#lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92);
            z-index: 999; align-items: center; justify-content: center; padding: 20px; }
#lightbox.open { display: flex; }
#lightbox img { max-width: 100%; max-height: 90vh; border-radius: 8px; }
#lightbox-close { position: absolute; top: 16px; right: 20px; font-size: 1.8rem;
                  color: white; cursor: pointer; line-height: 1; }
#lightbox-name { position: absolute; bottom: 16px; left: 0; right: 0; text-align: center;
                 font-size: 0.8rem; color: var(--text2); }

/* Refresh btn */
.refresh-row { display: flex; justify-content: flex-end; margin-bottom: 10px; }

/* Section title */
.section-title { font-size: 0.78rem; color: var(--text2); text-transform: uppercase;
                 letter-spacing: .08em; margin: 18px 0 10px; }

/* Conf mode tabs */
.conf-mode { display: flex; gap: 0; margin-bottom: 14px; border: 1px solid var(--border);
             border-radius: var(--radius); overflow: hidden; }
.conf-mode-btn { flex: 1; padding: 8px; text-align: center; font-size: 0.82rem;
                 cursor: pointer; background: var(--bg3); color: var(--text2);
                 border: none; transition: .15s; }
.conf-mode-btn.active { background: var(--accent); color: white; font-weight: 600; }

/* Conf editor sections */
.conf-section { background: var(--bg2); border: 1px solid var(--border);
                border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.conf-section-header { display: flex; justify-content: space-between; align-items: center;
                       padding: 10px 14px; cursor: pointer; user-select: none; }
.conf-section-header span { font-size: 0.82rem; font-weight: 600; color: var(--text); }
.conf-section-header .arrow { color: var(--text2); font-size: 0.75rem; transition: .2s; }
.conf-section-header.open .arrow { transform: rotate(180deg); }
.conf-section-body { display: none; padding: 10px 14px 14px; border-top: 1px solid var(--border); }
.conf-section-body.open { display: block; }
.conf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.conf-row.full { grid-template-columns: 1fr; }
.conf-field label { font-size: 0.72rem; color: var(--text2); display: block; margin-bottom: 3px; }
.conf-field input:not([type="checkbox"]), .conf-field select {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); padding: 7px 10px; border-radius: 6px;
  font-size: 0.85rem; outline: none; -webkit-appearance: none; }
.conf-field input:not([type="checkbox"]):focus, .conf-field select:focus { border-color: var(--accent); }
.conf-field select option { background: var(--bg3); }
.conf-check { display: flex; align-items: center; gap: 8px; padding: 7px 0; }
.conf-check label { font-size: 0.85rem; color: var(--text); margin: 0; cursor: pointer; }
</style>
</head>
<body>

<header>
  <div class="dot" id="status-dot"></div>
  <h1>dRICH Beam Test Analysis</h1>
  <span class="badge idle" id="status-badge">idle</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('run')">Run</div>
  <div class="tab" onclick="switchTab('log')">Log</div>
  <div class="tab" onclick="switchTab('plots')">Plots</div>
</div>

<!-- ===================== RUN PANEL ===================== -->
<div id="panel-run" class="panel active">

  <div class="field">
    <label>Data folder</label>
    <input id="data-folder" type="text" value="/home/riccardo/eic/data" placeholder="/path/to/data">
  </div>

  <div class="field">
    <label>Run ID</label>
    <div style="display:flex;gap:8px;">
      <input id="run-id" type="text" placeholder="20251117-173828" style="flex:1">
      <button class="btn-sm" onclick="loadRuns()">↻ List</button>
    </div>
    <select id="run-select" style="margin-top:6px;display:none" onchange="document.getElementById('run-id').value=this.value">
      <option value="">— select run —</option>
    </select>
  </div>

  <div class="toggle-row">
    <label class="toggle">
      <input type="checkbox" id="use-variants" onchange="toggleVariantMode()">
      <span class="slider"></span>
    </label>
    <span class="toggle-label">All variants mode (run_all.sh --variants)</span>
  </div>

  <div class="section-title">Configuration</div>
  <div class="conf-mode">
    <button class="conf-mode-btn active" onclick="setConfMode('preset')">Preset file</button>
    <button class="conf-mode-btn" onclick="setConfMode('custom')">Custom</button>
  </div>

  <!-- PRESET mode -->
  <div id="conf-preset">
    <div class="field">
      <label>Config file</label>
      <select id="conf-select">
        <option value="">— loading... —</option>
      </select>
    </div>
  </div>

  <!-- CUSTOM mode -->
  <div id="conf-custom" style="display:none">

    <!-- Track selection -->
    <div class="conf-section">
      <div class="conf-section-header open" onclick="toggleSection(this)">
        <span>Track selection</span><span class="arrow">▼</span>
      </div>
      <div class="conf-section-body open">
        <div class="conf-row">
          <div class="conf-field"><label>exact n tracks (0=off)</label><input type="number" id="c-require_exact_ntracks" value="1" min="0"></div>
          <div class="conf-field"><label>min n tracks (0=off)</label><input type="number" id="c-require_min_ntracks" value="1" min="0"></div>
        </div>
        <div class="conf-row">
          <div class="conf-field"><label>max n tracks (0=off)</label><input type="number" id="c-require_max_ntracks" value="0" min="0"></div>
          <div class="conf-field"><label>chi2 max</label><input type="number" id="c-chi2_max" value="5.0" step="0.5"></div>
        </div>
        <div class="conf-check">
          <input type="checkbox" id="c-apply_chi2_cut" checked>
          <label for="c-apply_chi2_cut">apply chi2 cut</label>
        </div>
        <div class="conf-check">
          <input type="checkbox" id="c-use_best_track_only">
          <label for="c-use_best_track_only">use best track only</label>
        </div>
        <div class="conf-check">
          <input type="checkbox" id="c-require_all_tracks_pass_geometric_cuts" checked>
          <label for="c-require_all_tracks_pass_geometric_cuts">all tracks pass geometric cuts</label>
        </div>
      </div>
    </div>

    <!-- Geometric cuts -->
    <div class="conf-section">
      <div class="conf-section-header open" onclick="toggleSection(this)">
        <span>Geometric cuts</span><span class="arrow">▼</span>
      </div>
      <div class="conf-section-body open">
        <div class="conf-check">
          <input type="checkbox" id="c-apply_geometric_track_selection" checked>
          <label for="c-apply_geometric_track_selection">apply geometric track selection</label>
        </div>
        <div style="margin-top:10px;font-size:0.75rem;color:var(--text2);margin-bottom:6px">PLANE 1 (scintillator)</div>
        <div class="conf-row">
          <div class="conf-field"><label>plane1</label>
            <select id="c-plane1"><option>SCINT</option><option>DRICH</option></select>
          </div>
          <div class="conf-field"><label>side1</label>
            <select id="c-side1"><option>INSIDE</option><option>OUTSIDE</option></select>
          </div>
        </div>
        <div class="conf-row full">
          <div class="conf-field"><label>cutg1</label><input type="text" id="c-cutg1" value="scint_largo"></div>
        </div>
        <div style="margin-top:10px;font-size:0.75rem;color:var(--text2);margin-bottom:6px">PLANE 2 (dRICH)</div>
        <div class="conf-row">
          <div class="conf-field"><label>plane2</label>
            <select id="c-plane2"><option>DRICH</option><option>SCINT</option></select>
          </div>
          <div class="conf-field"><label>side2</label>
            <select id="c-side2"><option>INSIDE</option><option>OUTSIDE</option></select>
          </div>
        </div>
        <div class="conf-row full">
          <div class="conf-field"><label>cutg2</label><input type="text" id="c-cutg2" value="rect -25 25 -25 25"></div>
        </div>
      </div>
    </div>

    <!-- Time cut -->
    <div class="conf-section">
      <div class="conf-section-header open" onclick="toggleSection(this)">
        <span>Time cut (ns)</span><span class="arrow">▼</span>
      </div>
      <div class="conf-section-body open">
        <div class="conf-row">
          <div class="conf-field"><label>time_cut_min</label><input type="number" id="c-time_cut_min" value="-2" step="1"></div>
          <div class="conf-field"><label>time_cut_max</label><input type="number" id="c-time_cut_max" value="0" step="1"></div>
        </div>
      </div>
    </div>

    <!-- Hit cuts -->
    <div class="conf-section">
      <div class="conf-section-header" onclick="toggleSection(this)">
        <span>Hit cuts</span><span class="arrow">▼</span>
      </div>
      <div class="conf-section-body">
        <div class="conf-row">
          <div class="conf-field"><label>ring band sigma</label><input type="number" id="c-ring_band_sigma" value="2.0" step="0.5"></div>
          <div class="conf-field"><label>signal frame threshold</label><input type="number" id="c-signal_frame_threshold" value="3" min="0"></div>
        </div>
        <div class="conf-check">
          <input type="checkbox" id="c-apply_afterpulse_cut" checked>
          <label for="c-apply_afterpulse_cut">apply afterpulse cut</label>
        </div>
        <div class="conf-check">
          <input type="checkbox" id="c-apply_radial_cut">
          <label for="c-apply_radial_cut">apply radial cut</label>
        </div>
        <div class="conf-check">
          <input type="checkbox" id="c-apply_multiplicity_cut">
          <label for="c-apply_multiplicity_cut">apply multiplicity cut</label>
        </div>
      </div>
    </div>

    <!-- Window selection -->
    <div class="conf-section">
      <div class="conf-section-header" onclick="toggleSection(this)">
        <span>Window selection</span><span class="arrow">▼</span>
      </div>
      <div class="conf-section-body">
        <div class="conf-check">
          <input type="checkbox" id="c-apply_window_selection">
          <label for="c-apply_window_selection">apply window selection</label>
        </div>
        <div class="conf-row">
          <div class="conf-field"><label>win sel min</label><input type="number" id="c-window_sel_min" value="-7.44" step="0.1"></div>
          <div class="conf-field"><label>win sel max</label><input type="number" id="c-window_sel_max" value="3.66" step="0.1"></div>
        </div>
        <div class="conf-row">
          <div class="conf-field"><label>win sel threshold</label><input type="number" id="c-window_sel_threshold" value="1" min="0"></div>
        </div>
        <div style="margin-top:8px" class="conf-check">
          <input type="checkbox" id="c-apply_window_veto">
          <label for="c-apply_window_veto">apply window veto</label>
        </div>
        <div class="conf-row">
          <div class="conf-field"><label>veto min</label><input type="number" id="c-window_veto_min" value="-300.0" step="1"></div>
          <div class="conf-field"><label>veto max</label><input type="number" id="c-window_veto_max" value="-8.0" step="1"></div>
        </div>
        <div class="conf-row">
          <div class="conf-field"><label>veto threshold</label><input type="number" id="c-window_veto_threshold" value="1" min="0"></div>
        </div>
      </div>
    </div>

    <!-- Detector geometry -->
    <div class="conf-section">
      <div class="conf-section-header" onclick="toggleSection(this)">
        <span>Detector geometry (mm)</span><span class="arrow">▼</span>
      </div>
      <div class="conf-section-body">
        <div class="conf-row">
          <div class="conf-field"><label>z_drich</label><input type="number" id="c-z_drich" value="-4250"></div>
          <div class="conf-field"><label>z_scint</label><input type="number" id="c-z_scint" value="-1150"></div>
        </div>
      </div>
    </div>

    <!-- Loop / Display -->
    <div class="conf-section">
      <div class="conf-section-header" onclick="toggleSection(this)">
        <span>Loop &amp; display</span><span class="arrow">▼</span>
      </div>
      <div class="conf-section-body">
        <div class="conf-row">
          <div class="conf-field"><label>first event</label><input type="number" id="c-first_event" value="0" min="0"></div>
          <div class="conf-field"><label>max frames (0=all)</label><input type="number" id="c-max_frames" value="1000000" min="0"></div>
        </div>
        <div class="conf-row">
          <div class="conf-field"><label>n display events</label><input type="number" id="c-n_display_events" value="100000" min="0"></div>
          <div class="conf-field"><label>timing bin width</label><input type="number" id="c-timing_bin_width" value="10.0" step="1"></div>
        </div>
      </div>
    </div>

  </div><!-- end #conf-custom -->

  <div class="section-title">Macros to run</div>
  <div class="macros-grid">
    <label class="macro-cb"><input type="checkbox" value="--analysis" checked><span>analysis</span></label>
    <label class="macro-cb"><input type="checkbox" value="--draw"><span>draw</span></label>
    <label class="macro-cb"><input type="checkbox" value="--display"><span>display</span></label>
    <label class="macro-cb"><input type="checkbox" value="--timing"><span>timing</span></label>
    <label class="macro-cb"><input type="checkbox" value="--mult-windows"><span>mult-windows</span></label>
    <label class="macro-cb"><input type="checkbox" value="--all"><span>all</span></label>
  </div>

  <button class="btn btn-run" id="run-btn" onclick="startRun()">▶ Run Analysis</button>
</div>

<!-- ===================== LOG PANEL ===================== -->
<div id="panel-log" class="panel">
  <div class="log-bar">
    <span id="log-status">No run started yet.</span>
    <button class="btn-sm" onclick="clearLog()">Clear</button>
  </div>
  <div id="log"></div>
  <div id="goto-plots-wrap" style="display:none;margin-top:14px">
    <button class="btn btn-run" onclick="switchTab('plots');loadSessions()" style="background:var(--green)">
      📊 Visualize Plots
    </button>
  </div>
</div>

<!-- ===================== PLOTS PANEL ===================== -->
<div id="panel-plots" class="panel">
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
    <select id="session-select" style="flex:1" onchange="onSessionChange()">
      <option value="">— no sessions —</option>
    </select>
    <button class="btn-sm" onclick="loadSessions()">↻</button>
  </div>
  <div id="conf-chips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px"></div>
  <div id="img-grid-container"></div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <span id="lightbox-close">✕</span>
  <img id="lightbox-img" src="">
  <div id="lightbox-name"></div>
</div>

<script>
// ---------------------------------------------------------------------------
// Conf mode (preset vs custom)
// ---------------------------------------------------------------------------
let confMode = 'preset';
function setConfMode(mode) {
  confMode = mode;
  document.querySelectorAll('.conf-mode-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && mode === 'preset') || (i === 1 && mode === 'custom'));
  });
  document.getElementById('conf-preset').style.display = mode === 'preset' ? '' : 'none';
  document.getElementById('conf-custom').style.display = mode === 'custom' ? '' : 'none';
}

function toggleSection(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

function getCustomConf() {
  const bool = id => document.getElementById(id).checked ? 'true' : 'false';
  const val  = id => document.getElementById(id).value;
  const sel  = id => document.getElementById(id).value;
  return {
    require_exact_ntracks: val('c-require_exact_ntracks'),
    require_min_ntracks:   val('c-require_min_ntracks'),
    require_max_ntracks:   val('c-require_max_ntracks'),
    require_single_track:  'false',
    require_multi_track:   'false',
    apply_chi2_cut:        bool('c-apply_chi2_cut'),
    chi2_max:              val('c-chi2_max'),
    use_best_track_only:   bool('c-use_best_track_only'),
    require_all_tracks_pass_geometric_cuts: bool('c-require_all_tracks_pass_geometric_cuts'),
    apply_geometric_track_selection: bool('c-apply_geometric_track_selection'),
    plane1: sel('c-plane1'), side1: sel('c-side1'), cutg1: val('c-cutg1'),
    plane2: sel('c-plane2'), side2: sel('c-side2'), cutg2: val('c-cutg2'),
    time_cut_min: val('c-time_cut_min'),
    time_cut_max: val('c-time_cut_max'),
    ring_band_sigma:        val('c-ring_band_sigma'),
    signal_frame_threshold: val('c-signal_frame_threshold'),
    apply_afterpulse_cut:   bool('c-apply_afterpulse_cut'),
    apply_radial_cut:       bool('c-apply_radial_cut'),
    apply_multiplicity_cut: bool('c-apply_multiplicity_cut'),
    apply_window_selection: bool('c-apply_window_selection'),
    window_sel_min:         val('c-window_sel_min'),
    window_sel_max:         val('c-window_sel_max'),
    window_sel_threshold:   val('c-window_sel_threshold'),
    apply_window_veto:      bool('c-apply_window_veto'),
    window_veto_min:        val('c-window_veto_min'),
    window_veto_max:        val('c-window_veto_max'),
    window_veto_threshold:  val('c-window_veto_threshold'),
    apply_window_veto_2: 'false',
    window_veto_2_min: '-300.0', window_veto_2_max: '300.0', window_veto_2_threshold: '1',
    z_drich: val('c-z_drich'),
    z_scint: val('c-z_scint'),
    first_event: val('c-first_event'),
    max_frames:  val('c-max_frames'),
    n_display_events: val('c-n_display_events'),
    timing_bin_width: val('c-timing_bin_width'),
    display_nhits_cut_mode: 'none', display_nhits_min: '0', display_nhits_max: '3',
  };
}

// ---------------------------------------------------------------------------
// Tab switching
// ---------------------------------------------------------------------------
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['run','log','plots'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => {
    p.classList.toggle('active', p.id === 'panel-' + name);
  });
  if (name === 'plots') loadSessions();
}

// ---------------------------------------------------------------------------
// Load confs
// ---------------------------------------------------------------------------
async function loadConfs() {
  const res = await fetch('/api/confs').catch(() => null);
  if (!res) return;
  const confs = await res.json();
  const sel = document.getElementById('conf-select');
  sel.innerHTML = confs.map(c => `<option value="${c}">${c}</option>`).join('');
}

// ---------------------------------------------------------------------------
// Load runs from data folder
// ---------------------------------------------------------------------------
async function loadRuns() {
  const folder = document.getElementById('data-folder').value;
  const res = await fetch(`/api/runs?data_folder=${encodeURIComponent(folder)}`).catch(() => null);
  if (!res) return;
  const runs = await res.json();
  const sel = document.getElementById('run-select');
  if (runs.length === 0) { sel.style.display = 'none'; return; }
  sel.innerHTML = '<option value="">— select run —</option>' +
    runs.map(r => `<option value="${r}">${r}</option>`).join('');
  sel.style.display = 'block';
}

// ---------------------------------------------------------------------------
// Variant mode toggle
// ---------------------------------------------------------------------------
function toggleVariantMode() {
  const on = document.getElementById('use-variants').checked;
  document.getElementById('conf-field').querySelector('label').textContent =
    on ? 'Base conf for variants' : 'Config file';
}

// ---------------------------------------------------------------------------
// Run analysis via WebSocket + background polling fallback
// ---------------------------------------------------------------------------
let ws = null;
let wsPingInterval = null;
let pollInterval   = null;
let pollOffset     = 0;
let runActive      = false;

function startRun() {
  const dataFolder = document.getElementById('data-folder').value.trim();
  const runId      = document.getElementById('run-id').value.trim();
  const conf       = document.getElementById('conf-select').value;
  const variants   = document.getElementById('use-variants').checked;
  const macros     = [...document.querySelectorAll('.macro-cb input:checked')].map(i => i.value);

  if (!dataFolder || !runId) { alert('Data folder and Run ID are required.'); return; }
  if (macros.length === 0)   { alert('Select at least one macro.'); return; }

  if (ws) { ws.close(); }
  stopPolling();

  const custom_conf = confMode === 'custom' ? getCustomConf() : null;
  const confLabel   = confMode === 'custom' ? '(custom)' : (conf || '(default)');

  runActive = true;
  document.getElementById('goto-plots-wrap').style.display = 'none';
  setStatus('running');
  switchTab('log');
  clearLog();
  appendLog(`Starting analysis...\nRun: ${runId}\nConf: ${confLabel}\nMacros: ${macros.join(' ')}\n\n`);
  pollOffset = 1; // skip header line already shown

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/run`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ data_folder: dataFolder, run_id: runId,
                             conf, macros, use_variants: variants, custom_conf }));
    setRunBtn(true);
    // Ping every 25s to keep the connection alive
    wsPingInterval = setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send('__ping__');
    }, 25000);
  };
  ws.onmessage = e => {
    if (e.data === '__pong__') return;
    appendLog(e.data);
    pollOffset++;
    if (e.data.includes('[Done') || e.data.includes('[Error]')) onRunDone();
  };
  ws.onclose = () => {
    clearInterval(wsPingInterval);
    // If run still active, fall back to polling
    if (runActive) startPolling();
  };
  ws.onerror = () => { /* onclose will fire too */ };
}

function setRunBtn(running) {
  const btn = document.getElementById('run-btn');
  btn.disabled = running;
  btn.textContent = running ? '⏳ Running...' : '▶ Run Analysis';
}

function onRunDone() {
  runActive = false;
  stopPolling();
  setRunBtn(false);
  setStatus('done');
  document.getElementById('goto-plots-wrap').style.display = 'block';
}

// ---------------------------------------------------------------------------
// Polling fallback (when WS is lost — phone screen off, app backgrounded)
// ---------------------------------------------------------------------------
function startPolling() {
  if (pollInterval) return;
  appendLog('\n[Connection lost — continuing in background, polling for updates...]\n');
  pollInterval = setInterval(async () => {
    const res = await fetch(`/api/run-log?offset=${pollOffset}`).catch(() => null);
    if (!res) return;
    const data = await res.json();
    if (data.lines.length) {
      data.lines.forEach(l => appendLog(l));
      pollOffset += data.lines.length;
    }
    if (data.done) {
      onRunDone();
      appendLog(`\n[Run finished — exit code ${data.exit_code}]\n`);
    }
  }, 2000);
}

function stopPolling() {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

// Resume polling when tab comes back to foreground
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && runActive) {
    // Try to reconnect WS first; if not possible, polling is already active
    if (!pollInterval && (!ws || ws.readyState !== WebSocket.OPEN)) {
      startPolling();
    }
  }
});

// ---------------------------------------------------------------------------
// Log helpers
// ---------------------------------------------------------------------------
function appendLog(text) {
  const el = document.getElementById('log');
  el.textContent += text;
  el.scrollTop = el.scrollHeight;
  document.getElementById('log-status').textContent =
    'Last line: ' + text.trim().split('\n').pop().slice(0, 60);
}
function clearLog() {
  document.getElementById('log').textContent = '';
}

// ---------------------------------------------------------------------------
// Status
// ---------------------------------------------------------------------------
function setStatus(s) {
  const dot   = document.getElementById('status-dot');
  const badge = document.getElementById('status-badge');
  dot.className   = 'dot' + (s === 'running' ? '' : s === 'error' ? ' red' : '');
  badge.className = 'badge ' + s;
  badge.textContent = s;
}

// ---------------------------------------------------------------------------
// Plot browser
// ---------------------------------------------------------------------------
let allSessions = [];

async function loadSessions() {
  const res = await fetch('/api/plot-sessions').catch(() => null);
  if (!res) return;
  allSessions = await res.json();
  const sel = document.getElementById('session-select');
  if (allSessions.length === 0) {
    sel.innerHTML = '<option value="">— no sessions —</option>';
    document.getElementById('conf-chips').innerHTML = '';
    document.getElementById('img-grid-container').innerHTML =
      '<p style="color:var(--text2);font-size:.9rem;">No plots yet.</p>';
    return;
  }
  sel.innerHTML = allSessions.map((s, i) =>
    `<option value="${i}">${s.run} &nbsp;·&nbsp; ${s.datetime} &nbsp;(${s.total_plots} plots)</option>`
  ).join('');
  sel.value = '0';
  renderConfChips(0);
  loadPlotsForSession(0, '');
}

function onSessionChange() {
  const i = parseInt(document.getElementById('session-select').value);
  renderConfChips(i);
  loadPlotsForSession(i, '');
}

function renderConfChips(i) {
  const s = allSessions[i];
  const box = document.getElementById('conf-chips');
  if (!s || s.confs.length === 0) { box.innerHTML = ''; return; }
  box.innerHTML =
    `<span class="conf-chip active" onclick="selectChip(this,${i},'')">all</span>` +
    s.confs.map(c =>
      `<span class="conf-chip" onclick="selectChip(this,${i},'${c}')">${c}</span>`
    ).join('');
}

function selectChip(el, i, conf) {
  document.querySelectorAll('#conf-chips .conf-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  loadPlotsForSession(i, conf);
}

async function loadPlotsForSession(i, conf) {
  const s = allSessions[i];
  if (!s) return;
  const url = `/api/plot-files?run=${encodeURIComponent(s.run)}&datetime=${encodeURIComponent(s.datetime)}&conf=${encodeURIComponent(conf)}`;
  const res = await fetch(url).catch(() => null);
  if (!res) return;
  const files = await res.json();

  const container = document.getElementById('img-grid-container');
  if (files.length === 0) {
    container.innerHTML = '<p style="color:var(--text2);font-size:.9rem;margin-top:8px">No PNG plots found.</p>';
    return;
  }
  container.innerHTML = `
    <div class="img-grid">
      ${files.map(f => {
        const name = f.split('/').pop().replace('.png','');
        return `<div class="img-card" onclick="openLightbox('${f}','${name}')">
          <img src="${f}" loading="lazy" alt="${name}">
          <p>${name}</p>
        </div>`;
      }).join('')}
    </div>`;
}

// ---------------------------------------------------------------------------
// Lightbox
// ---------------------------------------------------------------------------
function openLightbox(src, name) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-name').textContent = name;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
loadConfs();
</script>
