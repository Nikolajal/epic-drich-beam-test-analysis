# mapping_conf.2025.toml — detector geometry for the 2025 test-beam run
# Encodes the physical layout of PDUs in the detector plane and the
# correspondence between ALCOR device/chip addresses and PDU positions.

# Physical XY centre of each PDU [mm], relative to the beam-axis reference point.
# Key = PDU index (1-based, per assembly drawing); value = [x, y].
[pdu_xy_position]
1 = [-82.0,  30.0]
2 = [-26.0,  35.0]
3 = [ 30.0,  30.0]
4 = [ 30.0, -26.0]
5 = [ 30.0, -82.0]
6 = [-26.0, -87.0]
7 = [-82.0, -82.0]
8 = [-82.0, -26.0]

# true → PDU is mounted rotated 180° about its centre (reverses quadrant ordering).
[pdu_rotation]
1 = true
2 = true
3 = true
4 = true
5 = true
6 = true
7 = true
8 = true

# Maps "deviceID_chipIndex" → [pdu_index, quadrant] (quadrants 1–4, row-major).
# Consecutive even/odd chip pairs share a quadrant (e.g. _0 and _1 cover the same
# 2×2 pixel block on the SiPM tile, read by two independent ALCOR input channels).
# PDU index 99 is a sentinel for non-Cherenkov (timing / ancillary) devices.
[device_chip_to_pdu_matrix]
"192_0" = [1, 1]
"192_1" = [1, 1]
"192_2" = [1, 2]
"192_3" = [1, 2]
"192_4" = [1, 3]
