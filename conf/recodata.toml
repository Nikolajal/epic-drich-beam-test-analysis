# conf/recodata.toml — recodata-side live-QA pipeline configuration
#
# Drives the photon-counting + radial-distribution machinery in
# recodata_writer.  Parser: `recodata_conf_reader` in
# `src/config_reader.cxx`.  Design + scope:
# `include/triggers/streaming/DISCUSSION.md` § 2.6.
#
# All keys are optional — missing keys take the defaults documented
# in `RecodataConfigStruct` (see `include/util/config_reader.h`).
# Sanity warnings are emitted at startup if any value is out of range;
# loaded values are echoed via `mist::logger::info` so you can verify
# the active configuration in the run log.

[recodata]

# ─────────────────────────────────────────────────────────────────────────────
# Coverage map geometry
# ─────────────────────────────────────────────────────────────────────────────
#
# The coverage map is a 2D TH2F(phi, R) computed once at writer init
# from the channel-to-position map (the same `index_to_hit_xy` that
# both writers build via Mapping).  Each (phi, R) bin's content is the
# number of channels whose pixel footprint overlaps that bin — a pure
# geometric quantity, no spill weighting in V1.
#
# `radial_efficiency(coverage_map, axis)` collapses this to a 1D eff(R)
# by averaging over phi, used to correct the radial(R) hist at finalize.
n_phi_bins_coverage =   360    # azimuthal bins over [-pi, pi]  (1 deg/bin)
n_r_bins_coverage   =    80    # radial bins
r_min_coverage_mm   =   25.0   # mm
r_max_coverage_mm   =  125.0   # mm

# Channel pixel half-side [mm].  3 mm pitch → 1.5.  Used by both the
# coverage map rasterisation and by `azimuthal_coverage_fraction`'s
# per-channel angular span.  Keep these consistent — otherwise eff(R)
# and f_coverage describe different geometries.
channel_half_width_mm =  1.5

# Nominal ring centre [mm] — the beam-axis projection on the detector
# plane.  For a centred beam this is (0, 0); offset for known beam
# misalignment.  Only used for the COVERAGE map and the eff(R) curve;
# per-event (R, phi) and per-ring f_coverage use the per-event Hough
# centre re-fit by recodata via fit_circle on the mask-tagged hits.
#
# DISCUSSION § 2.6 justifies the mixed convention: the discrepancy
# from per-event centre wander (~10–25 mm RMS observed in
# `ring_X/Y_first_hough`) is < 1% on eff(R) at typical ring radii
# (35–105 mm).
nominal_centre_x_mm =    0.0
nominal_centre_y_mm =    0.0

# ─────────────────────────────────────────────────────────────────────────────
# Per-ring photon counting
# ─────────────────────────────────────────────────────────────────────────────

# Channel-on-arc bandwidth [mm] used by `azimuthal_coverage_fraction`:
# a channel counts as "on the ring" if `|r_ch - R| < delta_r`.  Should
# match the upstream `collection_radius` from `[streaming_hough]` so
# the f_coverage estimate is consistent with the hit-assignment cut.
# Diverging values are not wrong but make the relationship between
# N_hits and N_photons less direct.
delta_r_for_coverage_mm =  3.0   # mm

# Minimum hits per ring for the re-fit to be attempted.  Below this
# the ring is skipped (no N_photons / radial fill).  Matches the
# upstream Hough `min_hits` floor so the recodata and lightdata views
# agree on what counts as a ring.
min_hits_per_ring       =  5

# Skip channels with r_channel < this value when building the coverage
# map.  Default 0 = no extra filter (use only the loose
# |x|<5 && |y|<5 filter from index_to_hit_xy construction).
#
# If the coverage map shows a "low-R bump" at small R that doesn't
# correspond to any physical channel in the detector geometry —
# typically because Mapping returns slightly-bogus positions for
# uncalibrated / unused channel slots — bump this above the bump's
# R to crop it out.
#
# Diagnostic: recodata_writer logs the 10 smallest-r channels at
# startup with their (device, chip, channel, x, y, r) tuples.  Use
# those to identify suspicious entries vs legitimate inner channels.
min_channel_r_for_coverage_mm = 0.0
