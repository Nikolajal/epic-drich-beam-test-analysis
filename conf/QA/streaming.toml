# conf/QA/streaming.toml — fast-feedback QA override for the software trigger pipeline.
#
# Loaded instead of `conf/streaming.toml` when a writer is invoked with
# `--QA`.  Tuning goal: trim rings with low hit multiplicity so that
# operators get a quick rough-and-ready answer (Cherenkov is there / it
# isn't), at the cost of a known upward bias on N_γ.
#
# Bias direction (read before quoting QA-mode numbers in a paper):
#
#   σ_photon  ~invariant   — the LOO σ(N) = σ_photon·√(N/(N-3)) model
#                            estimates σ_photon per N-slice independently;
#                            cutting low-N slices reduces stats but does
#                            not bias the central value (the surviving
#                            slices still measure σ_photon the same way).
#                            Modulo a small selection effect if high-N
#                            rings are a physically cleaner population
#                            (typically pushes σ down, not up).
#
#   N_γ/ring  biased ↑     — the CB+pol3 integral divided by N_rings
#                            both grows (accepted rings have more hits)
#                            and shrinks-the-denominator (fewer rings
#                            pass).  Direction unambiguous; magnitude
#                            tunable via `hough_threshold_fraction` below.
#                            DO NOT quote QA-mode N_γ values as the run's
#                            physics result.
#
#   N_rings   ↓            — fewer events qualify, so per-run statistics
#                            on every observable are lower.  Helpful if
#                            you only want the top-quality rings.
#
# Stage 1 is left at production defaults — the QA bias comes from the
# stage 2 (RANSAC) thresholds below.

# QA-mode operating point (2026-05-29 audit): n_sigma_threshold raised
# to a sentinel value (1e9) so the streaming trigger NEVER fires.  The
# score histograms (h_streaming_score_noise red, h_streaming_score_data
# blue) still accumulate inside run_streaming_trigger_weighted on every
# scoring window — the threshold check only gates the *firing* path
# downstream of the score.  Net effect: the QA writer is ~6× faster
# (streaming/RANSAC cascade contributes ~0 s instead of ~290 s), AND the
# analyser still gets the bkg-vs-sig score distribution on the QA
# dashboard (emitted as ``qa/lightdata/05_streaming_score.pdf``).
# Analyser workflow: inspect the score plot, decide a production
# n_sigma_threshold from where the data tail crosses the noise tail,
# then set it for the production run (without --QA).
[streaming_trigger]
time_window_ns      =   20.0
n_sigma_threshold   =   1.0e9   # disabled in QA mode — score hists still fill
min_noise_hits      =   10.0
# In-beam-background QA sample (the violet 05_streaming_score curve): band ends
# `inbeam_pretrigger_offset_ns` before each hardware trigger, `inbeam_sample_width_ns` wide.
inbeam_pretrigger_offset_ns = 40.0
inbeam_sample_width_ns      = 600.0
default_trigger_window_ns   = 50.0   # fallback ±window (ns) for hits around a non-RANSAC hardware trigger

[streaming_ransac]

# ────────────────────────────────────────────────────────────────
# Coarse RANSAC accumulator.
#
# Both production (conf/defaults/streaming.toml) and QA now run the
# WIDE-ARC recipe: a coarse grid (r_step = cell_size = 3.0 mm,
# aggregation_window_cells = 1) over a wide centre range, with the
# subsequent floating-centre fit_circle re-fit in recodata supplying
# precision.  Voting and peak-finding scale with n_cells = nx·ny·n_R
# (~1/cell_size³), so the coarse grid keeps the wide-centre accumulator
# bounded — a 1.5 mm grid over a ±250 mm centre range would be ~8×
# larger and slower.
#
# Trade-off: centres are located to one 3-mm cell from the RANSAC seed,
# but the fit_circle re-fit refines them to sub-mm precision, so the
# resolution loss is on the seed, not the final ring measurement.
# ────────────────────────────────────────────────────────────────
# Physical-ring scan (narrowed from the wide far-arc coarse scan): the dRICH
# Cherenkov rings sit within ±15 mm of the detector centre with R ∈ [20, 120] mm.
# r_max = 120 is a HARD radius cut (ransac.cxx rejects rings outside
# [r_min, r_max]), which removes the spurious far/large-radius rings the wide
# scan admitted — the cause of the "ungodly" X/Y/R ranges.  Finer grid over the
# small range for readable QA hists.  NOTE: the centre is NOT hard-cut in the
# finder (RANSAC is centre-free); the radius cut + the on-sensor hit geometry
# keep centres near 0, and centre_padding_mm only sets the X/Y QA-hist extent.
r_min               =     20.0
r_max               =    120.0  # HARD upper radius cut (ransac.cxx rejects R outside [r_min,r_max])
r_step              =      2.0  # R-hist granularity over [20,120] → 50 bins
cell_size           =      1.0  # XY-hist cell over ±15 mm → 30 bins
centre_padding_mm   =     15.0  # ±15 mm centre range (X/Y QA-hist extent)

r_max_auto            =   false # explicit wide r_max (decoupled from padding)
sensor_half_extent_mm =   99.0  # r_max_auto only
r_margin_mm           =   10.0  # r_max_auto only
radial_eff_per_ring_centre = true  # keep arc-mode reconstruction in QA

# ────────────────────────────────────────────────────────────────
# QA-tuned ring acceptance — the only knobs that differ from
# production.  All three move in the same direction (tighter →
# only high-N rings pass).
# ────────────────────────────────────────────────────────────────

# Production: 0.33 — accept a peak cell when its votes are ≥ 33% of
# the currently-active hit count.  QA: 0.50 — require half the active
# hits to concentrate in the peak cell.  Cuts rings whose hits are
# more diffuse around the (real or fake) centre.
threshold_fraction       =   0.50

# Production: 0.50 — the absolute floor min_hits = floor(min_active ×
# slack) lets a ring with min_active/2 votes still fire.  QA: 0.75 —
# tighter, but still leaves headroom for statistical fluctuation.
min_hits_slack           =   0.75

# Production: 0.0035 — at 1648 active channels this floors min_active
# at ceil(5.8) = 6 hits.  QA: 0.008 — floors at ceil(13.2) = 14 hits.
# Doubles the entry gate; preserves statistics on the bright-ring
# population while cutting the long-tail fake rings.
# IGNORED under the RANSAC finder (vestigial RANSAC gates):
hough_n_sigma_dcr        =   0.0     # IGNORED (RANSAC)
min_ring_votes_floor     =   5       # IGNORED (RANSAC)
hough_threshold_fraction =   0.008   # IGNORED (RANSAC)

# RANSAC ring finder (mirror conf/defaults/streaming.toml).
collection_radius        =   6       # RANSAC inlier band [mm]
ransac_iterations        = 600
ransac_min_significance  = 5.0
ransac_min_inliers       = 8
# Auto-coupled to centre_padding_mm (left unset); set explicitly to zoom the
# per-ring centre QA hists.
# centre_xy_half_range_mm  =   25.0
#  Aggregation off in QA: the cell_size is already at the legacy
#  3 mm, so an 8-cell window would scan a 6³ mm³ volume — too coarse
#  for two-ring separation.  Single-cell peak at 3 mm matches the
#  pre-Q2-2026 production behaviour.
aggregation_window_cells =   1
# fit_circle_init_{x,y,r} removed 2026-05-30 (C3.5) — recodata seeds the
# refit from the RANSAC peak.  Tolerated for one release with a warning.

# ────────────────────────────────────────────────────────────────
# Recodata ring-reconstruction knobs (formerly conf/QA/recodata.toml).
# The only QA-specific override here is skip_loo_residuals — everything
# else (hardware_ring_dt_*, min_hits_per_ring, delta_r_for_coverage_mm)
# QA-matched production, so it inherits the defaults from
# conf/defaults/streaming.toml's [streaming_ransac] table.
#
# When true, the per-hit leave-one-out residual loop in
# compute_ring_fit_pure is skipped — the biggest single speedup lever
# for --QA mode.  Cost: σ_photon is NOT measurable from this run's
# output (h_residual_vs_n_* stay empty, no _sigma_photon_mm scalars).
# ────────────────────────────────────────────────────────────────
skip_loo_residuals       =  true

# Recodata per-ring quality floors (mirror conf/defaults/streaming.toml; set
# explicitly because the QA overlay is a full-file swap).  min_hits_per_ring
# rejects sub-8-hit random-coincidence "rings".  arc_span_min_rad is the span
# above which a free Taubin refit is trusted as a refinement of the finder seed;
# below it recodata keeps the finder centre (radius re-estimated from the hits)
# instead of a high-variance free refit — see conf/defaults/streaming.toml for
# the full dual-role note.
min_hits_per_ring        =  8
arc_span_min_rad         =  0.3
