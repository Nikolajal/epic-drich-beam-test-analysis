# conf/QA/recodata.toml — fast-feedback QA override for the recodata writer.
#
# Loaded instead of `conf/recodata.toml` when the writer is invoked
# with `--QA`.  Mirrors production values for everything that affects
# geometry / acceptance; the only QA-specific knob is the LOO-residual
# skip at the bottom.
#
# Bias direction:
#
#   σ_photon  — NOT MEASURED in QA mode.  The per-hit LOO residual
#               loop is skipped (it's the biggest speedup lever) and
#               h_residual_vs_n_* TH2Fs stay empty.  fit_sigma_vs_n
#               correctly skips with a "TH2F empty (0 entries)" log
#               line.  No `_sigma_photon_mm` TNamed scalars are
#               emitted.  Quote σ_photon only from production-mode
#               runs.
#
#   Everything else (coverage map, N_γ from CB+pol3 radial fit,
#   per-ring N_hits / N_photons / f_coverage / centre maps) is
#   unaffected by this knob — only the LOO loop is gated.

[recodata]

# ─────────────────────────────────────────────────────────────────────────────
# Coverage map geometry — UNCHANGED from production.
# ─────────────────────────────────────────────────────────────────────────────
n_phi_bins_coverage =   360
n_r_bins_coverage   =    80
r_min_coverage_mm   =   25.0
r_max_coverage_mm   =  125.0
channel_half_width_mm =  1.5
nominal_centre_x_mm =    0.0
nominal_centre_y_mm =    0.0

# ─────────────────────────────────────────────────────────────────────────────
# Per-ring photon counting — UNCHANGED from production.
# ─────────────────────────────────────────────────────────────────────────────
delta_r_for_coverage_mm =  3.0
min_hits_per_ring       =  5
min_channel_r_for_coverage_mm = 0.0

# ─────────────────────────────────────────────────────────────────────────────
# QA fast-path knob — the only thing that differs from production.
# ─────────────────────────────────────────────────────────────────────────────
#
# When true, the per-hit leave-one-out residual loop in
# `compute_ring_fit_pure` is skipped.  Saves ~N extra fit_circle calls
# per ring per event — the biggest single speedup lever for QA mode.
#
# Cost: σ_photon is not measurable from this run's output.  The
# h_residual_vs_n_* TH2Fs are still written (empty), so downstream
# diff scripts that check for hist presence still work; they just
# contain no data.
skip_loo_residuals = true
