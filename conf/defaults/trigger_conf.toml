# trigger_conf.toml — DEFAULT trigger sources (fallback for any run whose
# campaign has no conf/sets/<campaign>/ bundle).
#
# Per-campaign trigger routing is pinned under conf/sets/<campaign>/trigger_conf.toml
# and selected automatically from the run id via util::campaign_of → util::conf_path:
#   - 2025                 → conf/sets/2025/      (luca_and_finger on rdo device 196)
#   - 2026-SPS             → conf/sets/2026-SPS/  (luca_and_finger on rdo device 192)
#   - 2026-PS              → conf/sets/2026-PS/   (luca_and_finger on kc705 device 200)
#                            (the 2026 beam test split SPS→PS on 2026-06-10)
# A run whose campaign has no bundle falls back to this file.  (The trigger word
# also moved FIFO across campaigns, 99→32; the framer detects the trigger FIFO by
# range, any FIFO > 31, so that drift needs no config.)
#
# Each [[trigger]] entry defines one trigger source. The parser stops reading at
# the first "##" comment line, so entries below that marker are safely ignored.

[[trigger]]
name   = "luca_and_finger"   # human-readable label used in output trees and logs
index  = 0                   # trigger index (0-based); referenced in hit bitmasks
device = 200                 # ALCOR device ID (kc705) — generic fallback routing
delay  = 117                 # propagation delay (cc, 320 MHz → ~3.125 ns/cc ≈ 366 ns)

##
# Everything below this line is ignored by the parser.
# Good for disabled entries, notes, changelogs, etc.

# ---------------------------------------------------------------------------
# Schema reference (see DISCUSSION.md → D-05)
#
# Every [[trigger]] entry is exactly one of two shapes — nothing in between.
#
# DEVICE-MODE: the hardware tags the word as a trigger.  The entry just
# attaches a name, an index, and a delay offset.  One per `device`.
#   Required: name, index, device, delay
#   No source-selector keys (no fifo/column/pixel/eo_channel).
#
# CHANNEL-MODE: a normal data channel is FORCED into the trigger path.
# Required: name, index, device, delay, fifo, AND a channel position:
#   - column + pixel (canonical), or
#   - eo_channel ∈ [0, 31]   (= column * 4 + pixel)
# One per (device, fifo, column, pixel).
#
# Legacy fields `chip` and `use_hit` are no longer accepted — entries
# that still set them get a deprecation warning and the field is ignored.
# ---------------------------------------------------------------------------

# Example: channel-mode using column + pixel
[[trigger]]
name   = "my_pixel_trigger"
index  = 3
device = 196
fifo   = 5
column = 3
pixel  = 0
delay  = 80

# Example: channel-mode using eo_channel (equivalent to column=3, pixel=0)
[[trigger]]
name       = "my_pixel_trigger_alt"
index      = 4
device     = 196
fifo       = 5
eo_channel = 12
delay      = 80
