# conf/streaming.toml — software trigger pipeline configuration
#
# Two stages share this file:
#   [streaming_trigger]  — stage 1: DCR-weighted score + time clustering
#   [streaming_hough]    — stage 2: Hough ring finder (centre/radius
#                          refinement happens in recodata, not here)
#
# Both stages are documented in include/triggers/streaming/DISCUSSION.md.
# The framer does NOT read this file — these are writer-side knobs.  The
# section names are kept identical to the pre-Phase-2 location (which was
# inside conf/framer_conf.toml) to avoid breaking existing run scripts.

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 — DCR-weighted streaming score (D-12, v1 shipped)
# ─────────────────────────────────────────────────────────────────────────────
#
# Fires when the per-window weighted score
#     S = sum_{hits in window} 1 / m_c
# (m_c = channel's mean hits per trigger window, derived from the
# first-frames noise sample) crosses `n_sigma_threshold` standardised
# deviations above its pure-noise expectation.  Channels that haven't
# accumulated at least `min_noise_hits` in the first-frames sample are
# excluded from the weight bundle — under-measured channels have wildly
# variable rate estimates that would inflate the noise-score tail.
#
# Tune `n_sigma_threshold` PER-RUN from the QA score histograms via
# `streaming_n_sigma_threshold = X` in `run-lists/<year>.database.toml`
# (writer flag `--run-database` honours it).  Falls back to the C++
# default (3.0) when neither the rundb field nor `--n-sigma-threshold`
# is supplied.  To disable firing in QA mode, use conf/QA/streaming.toml
# (1e9 sentinel).  See § 1.5.2 in include/triggers/streaming/DISCUSSION.md.
[streaming_trigger]
time_window_ns      =   20.0    # sliding-window width (ns)
min_noise_hits      =   10.0    # min noise-sample hits for a channel to enter the weight bundle
# In-beam-background QA sample (the violet curve on 05_streaming_score):
# scored per hit over a band ending `inbeam_pretrigger_offset_ns` before each
# hardware trigger, `inbeam_sample_width_ns` wide.  Tune the offset to move the
# guard band; widen the width for more in-beam statistics.
inbeam_pretrigger_offset_ns = 40.0   # band ends this many ns before the trigger
inbeam_sample_width_ns      = 600.0  # band width sampled per hit (→ −640..−40 ns) — wide for in-beam stats
default_trigger_window_ns   = 50.0   # fallback ±window (ns) for hits around a non-Hough hardware trigger

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — Hough ring finder (gated on stage 1)
# ─────────────────────────────────────────────────────────────────────────────
#
# Runs on every frame where stage 1 fired.  Selects Cherenkov hits
# within ±time_window_ns (inherited from [streaming_trigger]) of the
# streaming-trigger's fine_time, votes them into a Hough accumulator,
# extracts up to 2 peak cells (hardcoded — two-radiator detector), and
# tags ring-member hits with HitmaskHoughRingTagFirst / *Second.  Emits
# one `_TRIGGER_HOUGH_RING_FOUND_` event per ring (mean time of tagged
# hits).  Centre/radius refinement happens in `recodata_writer` on the
# mask-tagged hits — not in this stage.
#
# `time_window_ns` (inherited from [streaming_trigger]) and `max_rings`
# (hardcoded to 2) are intentional non-knobs.
# `fit_circle_init_{x,y,r}` were removed (C3.5) — recodata seeds the
# per-ring refit from the Hough peak.  Configs that still carry the keys
# log a one-shot deprecation warning per key.
[streaming_hough]

# Hough accumulator geometry — set once at writer init via
# mist::ring_finding::HoughTransform's constructor.
#
# WIDE COARSE-SCAN RECIPE ACTIVE — far-off-centre / arc reconstruction.
#
# The beam can produce only ARCS of large Cherenkov rings whose centres sit
# far outside the sensor.  The first Hough pass is therefore a deliberately
# WIDE, COARSE scan:
#   * centre search:  X, Y ∈ ±centre_padding_mm  (±1000 mm here)
#   * radius scan:    R ∈ [r_min, r_max]         ([10, 1700] mm here — r_max
#                     capped at the reachable centre↔hit diagonal; see r_max)
# Precision is NOT the Hough's job — the floating-centre fit_circle refit
# downstream (seeded by a closed-form Kasa fit on the tagged hits) supplies
# sub-mm centres/radii.  So the grid is COARSE (cell_size = r_step = 25 mm,
# aggregation_window_cells = 1), which keeps the accumulator tiny despite the
# huge range:  nx·ny·nR ≈ 87·87·400 ≈ 3 M cells ≈ 12 MB (the LUT, a few hundred
# MB, dominates).  A fine 3 mm grid over this range would be multi-GB.
#
# Geometry note: with centres bounded to ±1000 mm and hits on the ±~85 mm
# sensor, the largest REACHABLE radius is the centre↔hit diagonal ≈ 1657 mm,
# so R bins above that are allocated but never voted — harmless at coarse cells.
#
# To revert to the legacy near-origin aggregation recipe, set:
#   r_max_auto = false, centre_padding_mm = 10, r_max = 105,
#   cell_size = r_step = 1.5, aggregation_window_cells = 2,
#   collection_radius = 2, radial_eff_per_ring_centre = false
# (the grid/aggregation values are a coupled set).
r_min               =     10.0  # minimum ring radius scanned (mm)
r_max               =   1700.0  # maximum ring radius scanned (mm).  Capped at the
                                # REACHABLE max: with centres ≤ ±(bbox+pad) and
                                # hits on the sensor, the centre↔hit diagonal is
                                # ≈ 1654 mm for centre_padding_mm=1000, so larger
                                # R bins would never be voted.  Raise together
                                # with centre_padding_mm if the centre grid grows.
r_step              =     25.0  # radius granularity (mm) — coarse (localise only)
cell_size           =     25.0  # XY accumulator cell size (mm) — coarse

# Radius-scan auto-coupling.  When true, r_max is DERIVED from the centre range
# (r_max = centre_padding_mm + sensor_half_extent_mm + r_margin_mm).  OFF here:
# the wide coarse scan sets r_max explicitly (10000) so it is decoupled from
# the centre padding.  (sensor_half_extent_mm / r_margin_mm only matter when
# r_max_auto = true.)
r_max_auto            =   false
sensor_half_extent_mm =   99.0  # hit bounding-box half-width (mm), r_max_auto only
r_margin_mm           =   10.0  # safety margin on the derived r_max, r_max_auto only

# Arc-mode recodata reconstruction (Kasa seed + arc-span guard + per-ring
# coverage-corrected radial fill).  Defaults to r_max_auto when unset; pinned
# ON here because the coarse scan runs with r_max_auto = false but still wants
# the far-off-centre reconstruction path.
radial_eff_per_ring_centre = true

# LUT padding — half-width (mm) of extra X/Y space added around the
# hit bounding box at `build_lut` time.  Sets how far outside the
# detector a ring centre is still findable.
#
# Default (commented out / set negative) pads by r_max = 105 mm, the
# safest setting — but for a Cherenkov detector the radiator plane
# constrains ring centres to lie close to the detector plane, so the
# legacy padding is hugely over-conservative.  Cutting the pad shrinks
# n_cells = nx * ny * n_R linearly in the squared X/Y extent and gives
# a proportional speedup on voting AND on the SAT peak finder build
# (DISCUSSION § 2.3.1).
#
# Tuning recipe:
#   1. Look at `ring_X_first_hough` and `ring_Y_first_hough` in the
#      QA file.  Note the half-width of the populated band.
#   2. Set this knob to ~1.5–2× that half-width to keep some slack.
#   3. Re-run; if any cluster lands at the X/Y axis edges of those
#      hists, the pad is too tight — bump it up.
#
# Setting to a very small value (< ring-radius worst case) WILL exclude
# legitimate rings; sanity-check against the `ring_X/Y_first_hough`
# distributions every time you change this.
centre_padding_mm   = 1000.0    # mm; half-width of the centre (X,Y) search grid
                                # → centres findable in ±(bbox+this).  Also sets
                                # the per-ring centre QA axis.  -1.0 falls back
                                # to r_max (legacy, incompatible with r_max_auto).

# Per-frame ring-finder parameters
#
# A ring is accepted only if the peak accumulator cell satisfies BOTH:
#   (1) peak_votes ≥ min_hits                   (absolute floor)
#   (2) peak_votes ≥ threshold_fraction × |active_hits|   (relative floor)
# where `active_hits` is the set of hits still in play (= input hits
# minus hits already assigned to previously-extracted rings).
#
# The three knobs below set those two floors via the chain
#
#     min_active = ceil(hough_threshold_fraction × N_active_cherenkov)
#     min_hits   = floor(min_active × min_hits_slack)
#
# and then `min_active` is *also* re-used by MIST as the "abort further
# rings" gate: if fewer than `min_active` hits remain in the active set
# after a ring is extracted, the next-ring pass is skipped.  So the
# three knobs trade off as follows:
#
# * `hough_threshold_fraction` — entry gate.  Raise it to suppress
#     mode A (random-noise rings) and to short-circuit the second-ring
#     pass on events that only have stage 1's noise pile-up.  Currently
#     0.004 was tuned **before** stage 1 became selective; with stage 1
#     gating Hough entry, this floor can almost certainly go up.
# * `min_hits_slack` — slack below `min_active` for the absolute vote
#     floor.  0.75 lets a real ring with `min_active × 0.75` votes still
#     fire (tolerates statistical fluctuation in the per-cell count).
#     Leave at 0.75 unless you're explicitly studying this lever.
# * `threshold_fraction` — relative floor.  Adapts per pass because
#     `|active_hits|` shrinks after each ring is extracted, so raising
#     this primarily suppresses **mode B** (duplicate-of-real-ring on
#     pass 2).  0.33 is the historical default; if you see `R_first`
#     and `R_second` peaked at the same value in `Hough rings/`, raise
#     to 0.5 or 0.6.  Note: the proper fix for mode B is the
#     not-yet-implemented merge pass (DISCUSSION § 2.5).
threshold_fraction       =   0.33    # relative floor: min fraction of currently-
                                     # active hits required in the peak cell.
                                     # Kept at the historical 0.33 — DCR junk is
                                     # now handled by the DCR-adaptive entry gate
                                     # (hough_n_sigma_dcr) rather than by over-
                                     # tightening this relative floor (which also
                                     # cut real dual-ring yield).
min_hits_slack           =   0.75    # ring-acceptance slack on the absolute vote
                                     # floor (0..1):  min_hits = floor(min_active ×
                                     # this).  Leave at 0.75 unless you're explicitly
                                     # studying the absolute floor.  Matches the
                                     # config_reader.h default.

# Hough entry gate (min_active).  PREFERRED: DCR-adaptive — min_active is set
# from the first-frames noise model as
#     min_active = max(min_ring_votes_floor, ceil(E_dark + hough_n_sigma_dcr·√E_dark))
# where E_dark = Σ_c m_c (expected background hits/window).  Scales the floor up
# on noisy runs, down on clean ones, mirroring stage 1's n_σ gate.  Set
# hough_n_sigma_dcr = 0 to fall back to the fixed-fraction path below.
# IGNORED under the RANSAC finder (vestigial Hough-accumulator gates — pending
# config cleanup): hough_n_sigma_dcr, min_ring_votes_floor,
# hough_threshold_fraction, threshold_fraction, min_hits_slack, and the geometry
# grid knobs (cell_size, r_step, centre_padding_mm, r_max_auto,
# sensor_half_extent_mm, r_margin_mm, aggregation_window_cells).
hough_n_sigma_dcr        =   0.0     # IGNORED (RANSAC)
min_ring_votes_floor     =   5       # IGNORED (RANSAC)
hough_threshold_fraction =   0.0035  # IGNORED (RANSAC)

collection_radius        =   6       # mm — RANSAC inlier band (|dist−R| < this).
                                     # Narrow (~ring width) so uniform DCR adds
                                     # only a thin baseline; the arc's excess wins.

# ── RANSAC ring finder (replaced the Hough accumulator) ──────────────────────
# Grid-free: samples 3 hits → exact circle, scores by inlier EXCESS over the
# expected uniform background, accepts on Poisson significance.  Far-off-centre
# / wide-radius is free (no accumulator); a concentrated arc beats small circles
# that merely graze uniform noise.  Centre/radius range = [r_min, r_max] above.
ransac_iterations        = 600       # RANSAC samples per ring
ransac_min_significance  = 5.0       # accept only if inlier excess > this·√(bg)
ransac_min_inliers       = 8         # absolute floor on a ring's inlier count
                                     # Watch `ring_finder_first_hitmap` for a
                                     # clean annulus vs a blob.

# Per-ring centre QA histograms' X/Y half-range (mm).  The Hough algorithm
# itself doesn't bound X/Y — this is a writer-side knob that sets the axis
# range of the per-ring centre hists ([-this, +this]).  The bin width is
# automatically snapped to `cell_size`.  Set wider than the expected
# centre spread for your beam line so legitimate rings don't fall in
# overflow; tighter to zoom in once you know where the ring centres land.
# Left unset in wide-arc mode: the reader auto-couples it to
# centre_padding_mm so the per-ring centre hists bracket the full centre
# range without overflow.  Set it explicitly (e.g. 25.0) to zoom in.
# centre_xy_half_range_mm  =  25.0     # mm

# Sub-cell aggregation in MIST's peak finder.  Default 1 = single-cell
# peak (legacy behaviour, current production).  Set to 2 to enable
# 2×2×2 sliding-window aggregation — the peak finder sums an 8-cell
# window at every position and reports the position with the maximum
# aggregated count.
#
# **Recipe to flip it on (recovers ~22 % peak_votes per 2026-Q2
# measurement, see DISCUSSION § 2.3.1):**
#
#   r_step                   =   1.5
#   cell_size                =   1.5
#   aggregation_window_cells =   2
#
# All three together; halving cell_size / r_step without aggregation
# loses 15-25 % acceptance, and aggregating at the unhalved grid covers
# a 6³ mm³ volume which is too coarse for two-ring separation.  Volume
# equivalence (= legacy single-cell at the original 3 mm) makes
# `min_hits` and `threshold_fraction` keep their physical meaning, so
# no threshold re-tuning is needed when flipping the recipe.
aggregation_window_cells =     1     # 1 = single-cell peak (wide-arc: precision
                                     # comes from the fit_circle refit, so the
                                     # coarse Hough only localises); 2 = aggregated
                                     # sub-cell (legacy near-origin recipe).

# fit_circle initial guess — REMOVED 2026-05-30 (C3.5).  recodata seeds
# the per-ring refit from the Hough peak's (cx, cy, radius) directly.
# Keys retained in old TOMLs are tolerated (warning + ignored) for one
# release; the warning + tolerance go away in v2.1.

# ────────────────────────────────────────────────────────────────
# Recodata ring-reconstruction knobs (formerly conf/recodata.toml).
#
# These five live here, in [streaming_hough], because they must stay
# consistent with the Hough geometry above — recodata re-fits the same
# rings the Hough stage seeds.  Read by `recodata_conf_reader` (which
# also pulls the coverage-map geometry from mapping_conf.toml's
# [coverage] table) and consumed by recodata_writer + lightdata_writer.
# The coverage-map geometry keys live in mapping_conf.toml.
# ────────────────────────────────────────────────────────────────

# Coincidence window (ns, relative to a hardware trigger's reference
# time) for selecting cherenkov hits for the ring fit on hardware-trigger
# frames (used when the Hough self-trigger isn't tagging ring hits, e.g.
# QA mode).  A hit is kept when dt_min <= (t_hit - t_ref) <= dt_max —
# asymmetric, since the Cherenkov light sits in a band after the trigger.
# Also drives the per-trigger in-window Cherenkov hitmaps in lightdata.
hardware_ring_dt_min_ns  =  -30.0
hardware_ring_dt_max_ns  =   30.0

# Minimum hits per ring for the re-fit to be attempted.  Below this the
# ring is skipped (no N_photons / radial fill).  Raised 5→8 for the wide
# coarse scan: 5-6-hit "rings" are random-coincidence junk that swamped the
# solo radial fit (drove solo N_gamma→0); 8+ hits keeps genuine arcs.
min_hits_per_ring        =    8

# Minimum azimuthal span [rad] of a ring's hits for a free (seedless) Taubin
# refit to be trusted.  Dual role in recodata:
#   - Hough/RANSAC-tagged path (the live path): recodata SEEDS the fit from the
#     finder's robust (cx,cy,R).  Above this span the seedless refit is trusted
#     as a refinement (if it stays near the seed); below it the finder centre is
#     kept and only the radius is re-estimated from the hits.  Either way the
#     ring is kept — never rejected — so far short arcs survive with the finder's
#     centre instead of collapsing toward the origin.
#   - Legacy time-window path (no seed available): below this span the ring is
#     rejected as a near-degenerate free fit.
# Set to 0.3 (~17°): physical far-off-centre arcs subtend ~36° (0.63 rad); 0.8
# (~46°) used to reject exactly those.  Consulted when arc-mode is active
# (radial_eff_per_ring_centre = true).
arc_span_min_rad         =    0.3

# Channel-on-arc bandwidth [mm] used by `azimuthal_coverage_fraction`:
# a channel counts as "on the ring" if |r_ch - R| < delta_r.  Should
# match `collection_radius` above so the f_coverage estimate is
# consistent with the hit-assignment cut.
delta_r_for_coverage_mm  =    3.0

# Skip the per-hit leave-one-out residual loop in compute_ring_fit_pure.
# false = production (σ_photon measured).  The QA streaming.toml sets
# this true — the biggest single speedup lever for --QA mode, at the
# cost of no σ_photon measurement (h_residual_vs_n_* stay empty).
skip_loo_residuals       =  false
