# ============================================================
#  ringtrack.conf — configurazione comune a analysis e draw
#  Sintassi: chiave = valore
#  Righe che iniziano con # sono commenti
# ============================================================

# Se non vuoto, usa solo i frame contenuti in quel file (es. signal_frames.txt)
frame_list_file =

# ------------------------------------------------------------
#  Loop
# ------------------------------------------------------------
first_event     = 0
max_frames      = 1000000

# ------------------------------------------------------------
#  Track selection
#  Se entrambi false: accetta tutti gli eventi con >= 1 traccia
#  Se entrambi true:  accetta tutti (single + multi)
# ------------------------------------------------------------
require_single_track = false
require_multi_track  = false

# ------------------------------------------------------------
#  Geometric cuts
#  plane: NONE | DRICH | SCINT | BOTH
#  side:  INSIDE | OUTSIDE
#  cutg:  scint_largo | scint_stretto | drich_largo | drich_stretto
#         rect xmin xmax ymin ymax
#  Impostare plane = NONE per disabilitare il taglio
# ------------------------------------------------------------
plane1 = NONE
side1  = OUTSIDE
cutg1  = scint_stretto

plane2 = NONE
side2  = OUTSIDE
cutg2  = rect -25 25 -25 25

# Se true: usa solo la traccia con chi2/ndf migliore per evento
# Se false: itera su tutte le tracce che passano i tagli
use_best_track_only = false

apply_chi2_cut  = true
chi2_max        = 5.0

# Se true: per eventi multitraccia, TUTTE le tracce devono passare
# i tagli geometrici (non solo la best). Se anche una fallisce,
# l'evento viene scartato interamente.
require_all_tracks_pass_geometric_cuts = true

# ------------------------------------------------------------
#  Angular cuts
# ------------------------------------------------------------
apply_theta_phi_cut = false
theta_min =  0.0
theta_max =  0.001
phi_min   =  2.0
phi_max   =  3.14

apply_angle_xy_cut = false
angle_x_min = -0.05
angle_x_max =  0.05
angle_y_min = -0.05
angle_y_max =  0.05

# ------------------------------------------------------------
#  Hit cuts
# ------------------------------------------------------------
apply_afterpulse_cut   = true
apply_radial_cut       = false
apply_multiplicity_cut = false

# Larghezza della banda del ring per separare segnale e background
# segnale: |r_hit - R_ring| < ring_band_sigma * sigma_R
ring_band_sigma        = 2.0

# Soglia per classificare frame come segnale o background
# frame segnale:     n_signal_hits >= signal_frame_threshold
# frame background:  n_signal_hits <  signal_frame_threshold
signal_frame_threshold = 3

# Taglio sul numero di hit per il display
# mode: none | greater | range
# greater: n_hits > nhits_min
# range:   nhits_min <= n_hits <= nhits_max
display_nhits_cut_mode = none
display_nhits_min = 0
display_nhits_max = 3

# ------------------------------------------------------------
#  Detector geometry (mm)
# ------------------------------------------------------------
z_drich = -4250
z_scint = -1150

# ------------------------------------------------------------
#  Window selection (seleziona frame per attività temporale)
#  Tieni solo i frame con >= window_sel_threshold hit
#  nella finestra [window_sel_min, window_sel_max]
#  Può essere diversa dal time cut principale
# ------------------------------------------------------------
apply_window_selection = false
window_sel_min         = -7.44
window_sel_max         =  3.66
window_sel_threshold   = 1

apply_window_veto      = false
window_veto_min        = -300.0
window_veto_max        =  -8.0
window_veto_threshold  = 1

apply_window_veto_2    = false
window_veto_2_min      =   4.0
window_veto_2_max      = 300.0
window_veto_2_threshold = 1

# ------------------------------------------------------------
#  Time cut (ns)
# ------------------------------------------------------------
time_cut_min = -7.44
time_cut_max =  3.66

# ------------------------------------------------------------
#  Timing analysis
# ------------------------------------------------------------
timing_bin_width = 10.0

# Finestre temporali per ringtrack_mult_windows
# Sintassi: time_window_N = tmin tmax  (in ns)
# Label opzionale: time_window_N_label = sig | bkg
time_window_0 =  -7.44   3.66
time_window_0_label = sig_12ns
time_window_1 = -200.0  -188.0
time_window_1_label = bkg_12ns
time_window_2 =  -50.0   20.0
time_window_2_label = sig_70ns
time_window_3 =  -200.0  -130.0
time_window_3_label = bkg_70ns

# ------------------------------------------------------------
#  Display
# ------------------------------------------------------------
n_display_events = 100000