# .github/workflows/build.yml
#
# Build-only verification across the three major desktop platforms.
#
# ─────────────────────────────────────────────────────────────────────────────
# Disabled 2026-05-27: ALL build jobs gated with `if: false`.
#
# Why: ROOT availability per platform is fragile in CI —
#   - Linux:  Ubuntu noble dropped the apt `root-system` / `libroot-*-dev`
#             packages (never officially maintained by CERN).
#   - Windows: conda-forge has no `root` recipe for win-64; no maintained
#             chocolatey package; vcpkg is slow and brittle.
#   - macOS:  Homebrew `root` formula churns periodically.
#
# The workflow architecture (per-OS matrix, build/test/install steps, ROOT
# provisioning via the OS-native package manager / conda-forge / Homebrew)
# is preserved verbatim so it can be re-enabled stage-by-stage when there
# is bandwidth to chase the per-platform issues again.
#
# To re-enable a single OS leg:
#   - Find the corresponding job (build-linux / build-macos / build-windows).
#   - Remove its `if: false` gate.
#   - Push a branch with the change to validate against fresh runner images
#     before merging into dev / main.
#
# ─────────────────────────────────────────────────────────────────────────────
#
# Original design notes (still valid intent, for future revival):
#
# The framework's runtime dependency on ROOT (≥ 6.x) makes a "build all the
# things" job non-trivial on Windows — the official ROOT Windows binaries
# are recent but the toolchain churn means Linux and macOS remain the
# primary supported targets.  When enabled, this workflow splits into three
# legs:
#
#   ubuntu-latest   — conda-forge ROOT, required-status check.
#   macos-latest    — Homebrew-installed ROOT, required-status check.
#   windows-latest  — conda-forge ROOT *(not currently available for win-64;
#                     keep as architectural placeholder until a working
#                     Windows ROOT provisioner is identified)*, marked
#                     `continue-on-error: true` so a ROOT update doesn't
#                     block merges into main while the configuration
#                     stabilises.

name: Build

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Linux — ROOT from conda-forge.  Same provider as the Windows leg.
  # The conda-forge `root` recipe ships rootcling + RIO + Tree + Hist +
  # Graf + Gui — everything our dictionary generation pipeline needs —
  # and tracks upstream ROOT releases across Ubuntu image refreshes
  # (where the legacy Debian Science apt packages are no longer
  # available on noble).
  # -------------------------------------------------------------------------
  build-linux:
    name: Linux / ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    if: false   # ── disabled 2026-05-27, see header.  Drop this line to re-enable.
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    defaults:
      run:
        # Activate the conda env on every step so root-config / rootcling
        # are on PATH for FindROOT.cmake + the build itself.
        shell: bash -l {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: btana
          python-version: "3.11"

      - name: Install ROOT and toolchain via conda-forge
        run: |
          conda install -n btana -c conda-forge -y \
            root cmake ninja cxx-compiler

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install \
            -DBTANA_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --build-config ${{ matrix.build_type }}

      - name: Install
        run: cmake --install build

  # -------------------------------------------------------------------------
  # macOS — ROOT from Homebrew.  We use macos-latest (currently macos-14,
  # arm64); ROOT supports both arm64 and x86_64.  Build time is ~25 min for
  # a cold ROOT install, so we cache the Homebrew prefix between runs.
  # -------------------------------------------------------------------------
  build-macos:
    name: macOS / ${{ matrix.build_type }}
    runs-on: macos-latest
    if: false   # ── disabled 2026-05-27, see header.  Drop this line to re-enable.
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ROOT and toolchain
        run: |
          brew update
          brew install cmake ninja root

      - name: Configure
        run: |
          # source thisroot.sh so root-config is on PATH for FindROOT.cmake.
          source "$(brew --prefix root)/bin/thisroot.sh"
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install \
            -DBTANA_BUILD_TESTS=ON

      - name: Build
        run: |
          source "$(brew --prefix root)/bin/thisroot.sh"
          cmake --build build --parallel

      - name: Test
        working-directory: build
        run: |
          source "$(brew --prefix root)/bin/thisroot.sh"
          ctest --output-on-failure --build-config ${{ matrix.build_type }}

      - name: Install
        run: cmake --install build

  # -------------------------------------------------------------------------
  # Windows — ROOT from conda-forge.  Marked best-effort while the
  # cross-platform build is firming up; failures here will not block PRs.
  # When this leg is consistently green for several weeks, remove the
  # `continue-on-error: true` line and promote it to a required check.
  # -------------------------------------------------------------------------
  build-windows:
    name: Windows / ${{ matrix.build_type }} (best-effort)
    runs-on: windows-latest
    if: false   # ── disabled 2026-05-27, see header.  conda-forge has no
                #    win-64 root recipe today; revival needs a working
                #    Windows ROOT provisioner (root.cern tarball, vcpkg, …).
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]   # Debug ROOT on Windows is unreliable

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: btana
          python-version: "3.11"

      - name: Install ROOT via conda-forge
        run: |
          conda install -n btana -c conda-forge -y root cmake ninja

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build
