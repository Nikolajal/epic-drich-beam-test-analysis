# .github/workflows/build.yml
#
# Build-only verification across the three major desktop platforms.
#
# The framework's runtime dependency on ROOT (≥ 6.x) makes a "build all the
# things" job non-trivial on Windows — the official ROOT Windows binaries
# are recent but the toolchain churn means Linux and macOS remain the
# primary supported targets.  This workflow therefore splits into three
# legs:
#
#   ubuntu-latest   — apt-installed ROOT, required-status check.
#   macos-latest    — Homebrew-installed ROOT, required-status check.
#   windows-latest  — Conda-installed ROOT, allowed to fail (best-effort).
#
# The Windows leg is opt-out via `continue-on-error: true` so a ROOT/Conda
# update doesn't block merges into main while the configuration stabilises;
# remove that flag once the leg is reliably green.

name: Build

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Linux — ROOT from APT (Ubuntu's ROOT package ships a ready-to-use
  # toolchain with rootcling, RIO, Tree, Hist, Graf, Gui — everything our
  # dictionary generation pipeline needs).
  # -------------------------------------------------------------------------
  build-linux:
    name: Linux / ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ROOT and toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            root-system libroot-bindings-r-dev libroot-core-dev \
            libroot-io-dev libroot-tree-dev libroot-hist-dev \
            libroot-graf2d-dev libroot-graf3d-dev libroot-gui-dev

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install \
            -DBTANA_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --build-config ${{ matrix.build_type }}

      - name: Install
        run: cmake --install build

  # -------------------------------------------------------------------------
  # macOS — ROOT from Homebrew.  We use macos-latest (currently macos-14,
  # arm64); ROOT supports both arm64 and x86_64.  Build time is ~25 min for
  # a cold ROOT install, so we cache the Homebrew prefix between runs.
  # -------------------------------------------------------------------------
  build-macos:
    name: macOS / ${{ matrix.build_type }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ROOT and toolchain
        run: |
          brew update
          brew install cmake ninja root

      - name: Configure
        run: |
          # source thisroot.sh so root-config is on PATH for FindROOT.cmake.
          source "$(brew --prefix root)/bin/thisroot.sh"
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install \
            -DBTANA_BUILD_TESTS=ON

      - name: Build
        run: |
          source "$(brew --prefix root)/bin/thisroot.sh"
          cmake --build build --parallel

      - name: Test
        working-directory: build
        run: |
          source "$(brew --prefix root)/bin/thisroot.sh"
          ctest --output-on-failure --build-config ${{ matrix.build_type }}

      - name: Install
        run: cmake --install build

  # -------------------------------------------------------------------------
  # Windows — ROOT from conda-forge.  Marked best-effort while the
  # cross-platform build is firming up; failures here will not block PRs.
  # When this leg is consistently green for several weeks, remove the
  # `continue-on-error: true` line and promote it to a required check.
  # -------------------------------------------------------------------------
  build-windows:
    name: Windows / ${{ matrix.build_type }} (best-effort)
    runs-on: windows-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]   # Debug ROOT on Windows is unreliable

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: btana
          python-version: "3.11"

      - name: Install ROOT via conda-forge
        run: |
          conda install -n btana -c conda-forge -y root cmake ninja

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build
